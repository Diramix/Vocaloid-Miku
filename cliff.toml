[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}({{ commit.scope }}) {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
footer = """
## DONATE

If you liked the theme and want to support its author, [**Welcome to Boosty!**](https://boosty.to/diramix)

<p>
    <a href="https://boosty.to/diramix">
      <img width="300" alt="ᓚᘏᗢ the cat is waiting for your coin" src="https://github.com/Diramix/Vocaloid-Miku/blob/main/doc/boosty_button.png?raw=true">
    </a>
</p>
"""
trim = false

[git]
conventional_commits = true
filter_unconventional = true
split_commits = true
commit_parsers = [
  { message = "^feat", group = "New Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^refactor", group = "Improvements" },
  { message = "^perf", group = "Improvements" },
  { message = "^chore: change version", skip = true },
  { message = "^chore", group = "Other Changes" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
]
filter_commits = true
tag_pattern = "v?[0-9]+\\.[0-9]+.*"
topo_order = false
sort_commits = "oldest"
