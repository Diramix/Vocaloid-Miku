name: Release Pipeline

on:
  release:
    types: [created, published]

jobs:
  release:
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-notes:
    if: github.event.action == 'created'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --tag-pattern "v?[0-9]+\\.[0-9]+.*"

      - name: Set release notes
        if: steps.cliff.outputs.content != ''
        uses: actions/github-script@v7
        env:
          CLIFF_OUTPUT: ${{ steps.cliff.outputs.content }}
        with:
          script: |
            const release = context.payload.release;

            if (release.body && release.body.trim().length > 0) {
              console.log('Release already has a body, skipping.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: process.env.CLIFF_OUTPUT,
            });
